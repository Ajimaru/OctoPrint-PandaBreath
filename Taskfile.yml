# https://taskfile.dev

version: "3"

env:
  LOCALES: ["de"] # included locales; empty made babel-update/compile no-ops, blanking the top-level catalog
  TRANSLATIONS: octoprint_pandabreath/translations # translations folder, do not touch

tasks:
  install:
    desc: Installs the plugin into the current venv
    cmds:
      - "python -m pip install -e .[develop,test]"

  ### Test related

  test:
    desc: Run the test suite with coverage
    cmds:
      - python -m pytest

  test-cobertura:
    desc: Generate Cobertura coverage report for Codacy/Codecov
    cmds:
      - python -m pytest --cov=octoprint_pandabreath --cov-branch --cov-report=xml:cobertura.xml

  ### Build related

  build:
    desc: Builds sdist & wheel
    cmds:
      - python -m build --sdist --wheel

  build-sdist:
    desc: Builds sdist
    cmds:
      - python -m build --sdist

  build-wheel:
    desc: Builds wheel
    cmds:
      - python -m build --wheel

  ### Translation related

  babel-new:
    desc: Create a new translation for a locale
    cmds:
      - task: babel-extract
      - |
        pybabel init --input-file=translations/messages.pot --output-dir=translations --locale="{{ .CLI_ARGS }}"

  babel-extract:
    desc: Update pot file from source
    cmds:
      # Extract only from real source paths (mirrors CI i18n.yml). Scanning the
      # repo root pulled source refs from build/ and crashed on foreign Jinja
      # templates under .cache/octoprint-src (unknown {% assets %} tag).
      - pybabel extract --sort-output --mapping-file=babel.cfg --output-file=translations/messages.pot --msgid-bugs-address=i18n@octoprint.org --copyright-holder="The OctoPrint Project" setup.py octoprint_pandabreath tests

  babel-update:
    desc: Update translation files from pot file
    cmds:
      - for:
          var: LOCALES
        cmd: pybabel update --input-file=translations/messages.pot --output-dir=translations --locale={{ .ITEM }}

  babel-refresh:
    desc: Update translation files from source
    cmds:
      - task: babel-extract
      - task: babel-update

  babel-compile:
    desc: Compile translation files
    cmds:
      - pybabel compile --directory=translations

  babel-bundle:
    desc: Bundle translations
    preconditions:
      - test -d {{ .TRANSLATIONS }}
    cmds:
      - for:
          var: LOCALES
        cmd: |
          locale="{{ .ITEM }}"
          source="translations/${locale}"
          target="{{ .TRANSLATIONS }}/${locale}"

          [ ! -d "${target}" ] || rm -r "${target}"

          echo "Copying translations for locale ${locale} from ${source} to ${target}..."
          cp -r "${source}" "${target}"
