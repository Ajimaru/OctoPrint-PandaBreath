# Babel extraction config for pybabel — used by the translation pipeline
# in .development/compile_translations.sh (and the babel-extract Taskfile
# task). Patterns are relative to the working directory pybabel runs in,
# which is the repository root.

[python: **.py]

[jinja2: **.jinja2]
silent=false
# Note: octoprint.util.jinja.trycatch was intentionally removed — the
# plugin's templates do not use {% try %}/{% catch %} blocks, so we
# avoid pulling OctoPrint into the extract-only .venv just to import
# that Jinja extension.
extensions=jinja2.ext.do

[javascript: **.js]
extract_messages = gettext, ngettext
